name: Semantic Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  semantic-quality-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate executable docs examples
        run: go test ./internal/quality/docsexamples

      - name: Check documented broker identifiers
        run: scripts/check-doc-identifiers.sh

      - name: Check package dependencies
        run: scripts/check-dependencies.sh

      - name: Check invariant test gate
        run: scripts/check-invariant-gate.sh "$BASE_SHA" "$HEAD_SHA"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}

      - name: Check tracked source comments
        run: scripts/check-source-comments.sh
