name: Post-Merge Smoke

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build
        run: make build

      - name: Check Podman
        run: podman info

      - name: Podman readiness smoke (make readiness)
        run: make readiness

      - name: Login persistence smoke (make readiness-login)
        run: make readiness-login

      - name: Clean-host journey (make journey)
        run: make journey

      - name: Integration test compilation
        run: go vet -tags integration ./test/e2e/
