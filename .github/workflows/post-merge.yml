name: Post-Merge Smoke

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: make build

      - name: Readiness check (doctor --mode=host)
        run: ./bin/ai-agent doctor --mode=host

      - name: Integration test compilation
        run: go vet -tags integration ./internal/e2e/
