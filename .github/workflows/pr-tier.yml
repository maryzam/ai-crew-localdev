name: PR Tier

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify PR tier
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 300,
            });

            const filenames = files.map(f => f.filename);

            const t3Patterns = [
              /^internal\/broker\//,
              /^internal\/launcher\//,
              /^cmd\/ai-agent-credential-helper\//,
              /^cmd\/ai-agent-gh\//,
              /^\.devcontainer\//,
            ];
            const isT3 = filenames.some(f => t3Patterns.some(p => p.test(f)));

            const isT1 = !isT3 && filenames.every(f =>
              f.endsWith('.md') || f.endsWith('_test.go') || !f.endsWith('.go')
            );

            let tier, label;
            if (isT3) {
              tier = 'T3';
              label = 'tier/T3-full-review';
            } else if (isT1) {
              tier = 'T1';
              label = 'tier/T1-auto-merge';
            } else {
              tier = 'T2';
              label = 'tier/T2-light-review';
            }

            const existing = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })).data.map(l => l.name).filter(n => n.startsWith('tier/'));

            for (const old of existing) {
              if (old !== label) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: old,
                });
              }
            }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            } catch (e) {
              const colors = {
                'tier/T1-auto-merge': '0e8a16',
                'tier/T2-light-review': 'fbca04',
                'tier/T3-full-review': 'd93f0b',
              };
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: colors[label],
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            }

            core.info(`PR classified as ${tier}: ${label}`);
            core.info(`Files: ${filenames.join(', ')}`);
