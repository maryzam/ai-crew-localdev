name: PR Tier

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: pr-tier-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify PR tier
        id: classify-tier
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          fail_closed() {
            {
              printf '%s\n' 'tier=T3'
              printf '%s\n' 'label=tier/T3-full-review'
              printf 'files<<EOF\n%s\nEOF\n' "classification failed closed: $1"
            } >>"$GITHUB_OUTPUT"
            printf 'PR tier classification failed closed: %s\n' "$1" >&2
            exit 0
          }

          ensure_commit() {
            local sha="$1"
            [ -n "$sha" ] || return 1
            git cat-file -e "${sha}^{commit}" 2>/dev/null || git fetch --no-tags --depth=1 origin "$sha"
            git cat-file -e "${sha}^{commit}" 2>/dev/null
          }

          ensure_commit "$BASE_SHA" || fail_closed "base commit is unavailable"
          ensure_commit "$HEAD_SHA" || fail_closed "head commit is unavailable"

          mapfile -t filenames < <(git diff --name-only --diff-filter=ACMRTD "$BASE_SHA" "$HEAD_SHA")
          is_t3=false
          is_t1=true

          for filename in "${filenames[@]}"; do
            case "$filename" in
              internal/broker/*|internal/launcher/*|cmd/ai-agent-credential-helper/*|cmd/ai-agent-gh/*|.devcontainer/*)
                is_t3=true
                ;;
            esac
            case "$filename" in
              README.md|docs/*.md|docs/**/*.md|*_test.go)
                ;;
              *)
                is_t1=false
                ;;
            esac
          done

          if [ "$is_t3" = "true" ]; then
            tier=T3
            label=tier/T3-full-review
          elif [ "$is_t1" = "true" ]; then
            tier=T1
            label=tier/T1-auto-merge
          else
            tier=T2
            label=tier/T2-light-review
          fi

          {
            printf 'tier=%s\n' "$tier"
            printf 'label=%s\n' "$label"
            printf 'files<<EOF\n'
            printf '%s\n' "${filenames[@]}"
            printf 'EOF\n'
          } >>"$GITHUB_OUTPUT"

          printf 'PR classified as %s: %s\n' "$tier" "$label"
          printf 'Files:\n'
          printf '  %s\n' "${filenames[@]}"

      - name: Apply PR tier label
        uses: actions/github-script@v9
        env:
          TIER: ${{ steps.classify-tier.outputs.tier }}
          LABEL: ${{ steps.classify-tier.outputs.label }}
          FILES: ${{ steps.classify-tier.outputs.files }}
        with:
          script: |
            const tier = process.env.TIER;
            const label = process.env.LABEL;
            const filenames = (process.env.FILES || '').split('\n').filter(Boolean);

            const existing = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })).data.map(l => l.name).filter(n => n.startsWith('tier/'));

            for (const old of existing) {
              if (old !== label) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: old,
                });
              }
            }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            } catch (e) {
              const colors = {
                'tier/T1-auto-merge': '0e8a16',
                'tier/T2-light-review': 'fbca04',
                'tier/T3-full-review': 'd93f0b',
              };
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: colors[label],
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            }

            core.info(`PR classified as ${tier}: ${label}`);
            core.info(`Files: ${filenames.join(', ')}`);
