name: ADR Gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  adr-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Check ADR requirement
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          git fetch --no-tags origin "+refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}"
          git fetch --no-tags origin "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/pr/${PR_NUMBER}"
          printf '%s' "${PR_BODY}" >"${RUNNER_TEMP}/pr-body.txt"
          scripts/check-adr-gate.sh --range "refs/remotes/origin/${BASE_BRANCH}" "refs/remotes/origin/pr/${PR_NUMBER}" --body-file "${RUNNER_TEMP}/pr-body.txt"
