name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  GOLANGCI_LINT_VERSION: v2.4.0

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.classify.outputs.docs_changed }}
      full_verify: ${{ steps.classify.outputs.full_verify }}
      readiness: ${{ steps.classify.outputs.readiness }}
    steps:
      - uses: actions/checkout@v7

      - name: Classify changed paths
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: scripts/classify-ci-changes.sh

  docs:
    needs: changes
    if: needs.changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install docs tooling
        run: |
          npm install -g markdownlint-cli2
          python -m pip install --user codespell
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: taiki-e/install-action@v2
        with:
          tool: lychee

      - name: Docs check
        run: make docs-check

  verify:
    needs: changes
    if: needs.changes.outputs.full_verify == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cache Go lint tooling
        id: golangci-lint-cache
        uses: actions/cache@v6
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ runner.arch }}-${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install Go lint tooling
        if: steps.golangci-lint-cache.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}

      - name: Verify
        run: make verify-code

  readiness:
    needs: changes
    if: needs.changes.outputs.readiness == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check Podman
        run: podman info

      - name: Readiness smoke
        run: make readiness

      - name: Login persistence smoke
        run: make readiness-login
