name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.4.0
  READINESS_IMAGE: localhost/ai-agent-dev-readiness:ci-cache

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install docs tooling
        run: |
          npm install -g markdownlint-cli2
          python -m pip install --user codespell
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: taiki-e/install-action@v2
        with:
          tool: lychee

      - name: Cache Go lint tooling
        id: golangci-lint-cache
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ runner.arch }}-${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install Go lint tooling
        if: steps.golangci-lint-cache.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}

      - name: Verify
        run: make verify

  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Check Podman
        run: podman info

      - name: Cache readiness image
        id: readiness-image-cache
        uses: actions/cache@v4
        with:
          path: /tmp/ai-agent-readiness-image.tar
          key: readiness-image-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.dockerignore', '.devcontainer/Dockerfile', '.devcontainer/entrypoint.sh', 'go.mod', 'go.sum', 'Makefile', 'cmd/**/*.go', 'internal/**/*.go') }}

      - name: Load cached readiness image
        if: steps.readiness-image-cache.outputs.cache-hit == 'true'
        run: podman load -i /tmp/ai-agent-readiness-image.tar

      - name: Build readiness image
        if: steps.readiness-image-cache.outputs.cache-hit != 'true'
        run: podman build --progress=plain -f .devcontainer/Dockerfile -t "$READINESS_IMAGE" .

      - name: Save readiness image
        if: steps.readiness-image-cache.outputs.cache-hit != 'true'
        run: podman save -o /tmp/ai-agent-readiness-image.tar "$READINESS_IMAGE"

      - name: Readiness smoke
        run: make readiness
        env:
          AI_AGENT_READINESS_IMAGE: ${{ env.READINESS_IMAGE }}
