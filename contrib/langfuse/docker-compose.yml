version: "3.9"

services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:-langfuse-dev}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8.5-alpine
    restart: unless-stopped
    volumes:
      - langfuse-clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4.1-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_S3_SECRET_KEY:-minioadmin}
    volumes:
      - langfuse-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse-worker:
    image: langfuse/langfuse:3.22.0
    restart: unless-stopped
    command: ["node", "packages/server/dist/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env

  langfuse-web:
    image: langfuse/langfuse:3.22.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      langfuse-worker:
        condition: service_started
    ports:
      - "3000:3000"
    env_file: .env

volumes:
  langfuse-postgres:
  langfuse-clickhouse:
  langfuse-minio:
